<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1e">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>Murmur</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", sans-serif;
    background: #1a1a1e;
    color: #e0ddd8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* --- Tooltip --- */
  .tooltip {
    position: fixed;
    background: #222226;
    color: #aaa;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
    border: 1px solid #333338;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .tooltip.visible { opacity: 1; }

  /* --- Header: connection dot + status --- */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: #222226;
    border-bottom: 1px solid #333338;
    height: 28px;
    flex-shrink: 0;
    -webkit-app-region: drag; /* Electron: makes header a drag handle */
  }
  .header * { -webkit-app-region: no-drag; /* Allow clicks on child elements */ }

  .header .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .header .status-dot.green { background: #2ecc71; }
  .header .status-dot.red { background: #e74c3c; animation: pulse-dot 1s ease-in-out infinite; }
  .header .status-dot.orange { background: #f39c12; animation: pulse-dot 1.2s ease-in-out infinite; }
  .header .status-dot.yellow { background: #f1c40f; animation: pulse-dot 1.5s ease-in-out infinite; }
  .header .status-dot.gold { background: #c9b07c; }
  .header .status-dot.gray { background: #555; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header .status-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: #aaa;
    flex: 1;
  }

  .header .svc-indicators {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }

  .header .svc-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  .header .svc-dot.up { background: #2ecc71; }
  .header .svc-dot.down { background: #e74c3c; }

  .header .svc-label {
    font-size: 8px;
    color: #666;
    letter-spacing: 0.3px;
  }

  .svc-restart {
    background: none;
    border: none;
    color: #666;
    font-size: 14px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .svc-restart:hover { color: #e0d8d5; }
  .svc-restart.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* --- Mic Meter (hidden, folded into talk button) --- */
  .mic-meter {
    height: 0;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .mic-meter canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .mic-meter.muted canvas { opacity: 0; }

  /* --- Transcript --- */
  .transcript {
    flex: 1;
    min-height: 20vh;
    overflow-y: auto;
    padding: 0 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .transcript::-webkit-scrollbar { width: 3px; }
  .transcript::-webkit-scrollbar-thumb { background: #2c2c32; border-radius: 2px; }

  .conv-toolbar {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 10;
    padding: 4px 6px;
    background: rgba(26, 26, 30, 0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid #2c2c32;
    margin: 0 -12px 4px;
  }
  .conv-toolbar button {
    background: #2c2c32;
    border: 1px solid #3e4451;
    border-radius: 4px;
    color: #abb2bf;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 8px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .conv-toolbar button:hover { color: #e5e5e5; border-color: #4b5263; background: #3e4451; }
  .conv-toolbar button.active { color: #e0d8d5; }
  .conv-toolbar-spacer { flex: 1; }

  .msg {
    padding: 7px 10px;
    border-radius: 10px;
    font-size: var(--chat-font-size, 12.5px);
    line-height: 1.4;
    max-width: 88%;
    word-wrap: break-word;
    white-space: pre-wrap;
    animation: fadeIn 0.15s ease-in;
    cursor: pointer;
    position: relative;
  }

  .msg:hover { filter: brightness(1.15); }

  .msg .copied-toast {
    position: absolute;
    top: -20px;
    right: 8px;
    font-size: 10px;
    color: #2ecc71;
    opacity: 0;
    animation: toastUp 0.8s ease forwards;
  }

  @keyframes toastUp {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    background: #2c2c32;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }

  .msg.assistant {
    background: #222226;
    border: 1px solid #333338;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
  }

  .msg.user.bubble-active {
    border: 1.5px solid #e74c3c;
    transition: border-color 0.3s;
  }
  .msg.assistant.bubble-active {
    border-color: #c9b07c;
    transition: border-color 0.3s;
  }

  .msg-wrap {
    position: relative;
    align-self: flex-start;
    max-width: 88%;
  }
  .msg-wrap .msg { max-width: 100%; }
  .msg-replay {
    position: absolute;
    top: 2px;
    right: -28px;
    background: none;
    border: 1px solid #333338;
    border-radius: 4px;
    color: #9a9aa0;
    font-size: 10px;
    padding: 1px 5px;
    cursor: pointer;
    opacity: 0.5;
  }
  .msg-replay:hover { opacity: 1; color: #e8636b; border-color: #e8636b88; }

  .msg .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }

  .msg .role {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    font-weight: 600;
  }

  .msg.user .role { color: #e74c3c; }
  .msg.assistant .role { color: #c9b07c; }

  .msg .time {
    font-size: 9px;
    color: #666;
    font-variant-numeric: tabular-nums;
  }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 12px;
    font-style: italic;
  }

  /* Thinking placeholder */
  .msg.thinking {
    background: #222226;
    border: 1px solid #333338;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    color: #888;
  }

  .thinking-dots {
    display: inline-flex;
    gap: 3px;
    align-items: center;
  }

  .thinking-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #888;
    animation: thinking-bounce 1.2s ease-in-out infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes thinking-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* --- Talk Button --- */
  .talk-bar {
    padding: 8px 12px;
    background: #222226;
    border-top: 1px solid #333338;
    flex-shrink: 0;
  }

  .talk-bar button {
    width: 100%;
    padding: 16px 0;
    border: 2px solid #333338;
    border-radius: 14px;
    background: #1a1a1e;
    color: #888;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 52px;
    position: relative;
    overflow: hidden;
  }

  #talkWaveCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    pointer-events: none;
  }

  .talk-wave-label {
    position: relative;
    z-index: 1;
    font-size: 12px;
    font-weight: 600;
    background: rgba(26, 26, 30, 0.85);
    padding: 4px 14px;
    border-radius: 8px;
    pointer-events: none;
  }
  .talk-bar button.recording .talk-wave-label { color: #e74c3c; }
  .talk-bar button.speaking .talk-wave-label { color: #c9b07c; }

  .talk-bar button.idle-state {
    flex-direction: column;
    gap: 1px;
    padding: 4px 0;
  }
  .talk-bar button.idle-state .murmur-icon {
    width: 64px;
    height: 22px;
  }
  .talk-bar button.idle-state.mode-read {
    border-color: #3a7ca5;
    background: #3a7ca512;
  }
  .talk-bar button.idle-state.mode-read .murmur-icon { color: #3a7ca5; }
  .talk-bar button.idle-state.mode-read .talk-idle-hint { color: #3a7ca5; }

  .talk-bar button.idle-state.mode-type {
    border-color: #555;
    background: #1a1a1e;
    opacity: 0.5;
  }
  .talk-bar button.idle-state.mode-type .talk-idle-hint { color: #888; }

  .talk-idle-hint {
    font-size: 9px;
    color: #666;
    letter-spacing: 0.3px;
  }

  .talk-bar button:hover { background: #2a2a30; border-color: #55555a; color: #e0d8d5; }
  .talk-bar button:active { transform: scale(0.97); }

  .talk-bar button .murmur-icon {
    width: 56px;
    height: 24px;
    color: #e8636b;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .talk-bar button.recording .murmur-icon { opacity: 1; color: #e74c3c; }
  .talk-bar button.ready-to-listen .murmur-icon { opacity: 0.8; color: #2ecc71; }
  .talk-bar button.speaking .murmur-icon { opacity: 0.8; color: #c9b07c; }

  .talk-bar button.recording {
    border-color: #e74c3c;
    background: #e74c3c18;
    color: #e74c3c;
    font-weight: 600;
    animation: pulse-border 1s ease-in-out infinite;
  }

  .talk-bar button.transcribing {
    border-color: #f39c12;
    background: #f39c1218;
    color: #f39c12;
    cursor: wait;
  }

  .talk-bar button.thinking {
    border-color: #f1c40f;
    background: #f1c40f12;
    color: #f1c40f;
    cursor: wait;
    animation: pulse-border-yellow 1.5s ease-in-out infinite;
  }

  .talk-bar button.responding {
    border-color: #f1c40f;
    background: #f1c40f0a;
    color: #e0b800;
    cursor: wait;
  }

  .talk-bar button.speaking {
    border-color: #c9b07c;
    background: #c9b07c18;
    color: #c9b07c;
    cursor: pointer;
  }

  .talk-bar button.ready-to-listen {
    border-color: #2ecc71;
    background: #2ecc7122;
    color: #2ecc71;
    animation: pulse-border-green 1s ease-in-out infinite;
  }

  @keyframes pulse-border-green {
    0%, 100% { border-color: #2ecc71; }
    50% { border-color: #2ecc7155; }
  }

  @keyframes pulse-border {
    0%, 100% { border-color: #e74c3c; }
    50% { border-color: #e74c3c55; }
  }

  @keyframes pulse-border-yellow {
    0%, 100% { border-color: #f1c40f; }
    50% { border-color: #f1c40f44; }
  }

  /* --- Controls Row --- */
  .controls {
    display: flex;
    gap: 3px;
    padding: 6px 8px 0;
    background: #222226;
    flex-shrink: 0;
    height: 30px;
    flex-wrap: nowrap;
    justify-content: center;
  }

  .controls button {
    padding: 0;
    border: 1px solid #333338;
    border-radius: 5px;
    background: #1a1a1e;
    color: #e0d8d5;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    flex-shrink: 0;
  }

  .controls button:hover { background: #2a2a30; }
  .controls button:active { transform: scale(0.96); }

  .controls button.stop { border-color: #333338; color: #e74c3c; font-size: 9px; }
  .controls button.stop:hover { background: #e74c3c22; border-color: #e74c3c88; }

  .controls button.mute-btn { color: #e74c3c; width: 28px; padding: 0; }
  .controls button.mute-btn svg { display: block; }
  .controls button.mute-btn.active { color: #555; opacity: 0.5; }

  .controls button.mode-btn {
    width: auto;
    padding: 0 5px;
    color: #e8636b;
    border-color: #e8636b66;
  }
  .controls button.mode-btn:hover { background: #ffffff08; }
  .controls button.mode-btn.active { color: #2ecc71; border-color: #2ecc7166; }

  .controls button.speed {
    border-color: #333338;
    color: #9a9aa0;
    font-variant-numeric: tabular-nums;
    width: auto;
    padding: 0 5px;
  }
  .controls button.speed:hover { background: #2a2a30; }

  .controls button.voice-btn {
    border-color: #333338;
    color: #888;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 5px;
    width: auto;
  }
  .controls button.voice-btn:hover { background: #2a2a30; color: #e0d8d5; }

  /* Text input bar (between controls and terminal) */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px calc(6px + env(safe-area-inset-bottom, 0px));
    background: #222226;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    background: #1a1a1e;
    border: 1px solid #333338;
    border-radius: 6px;
    color: #e0d8d5;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    font-family: inherit;
  }
  .input-bar input { user-select: text; -webkit-user-select: text; }
  .input-bar input:focus { border-color: #e8636b88; }
  .input-bar button {
    background: #e8636b;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0;
  }
  .input-bar button:hover { background: #d4545c; }

  /* Voice select popover */
  .voice-popover {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 12px;
    right: 12px;
    background: #222226;
    border: 1px solid #333338;
    border-radius: 8px;
    padding: 8px;
    z-index: 50;
    max-height: 200px;
    overflow-y: auto;
  }

  .voice-popover.show { display: block; }

  .voice-popover .voice-option {
    padding: 5px 8px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    border-radius: 4px;
  }

  .voice-popover .voice-option:hover { background: #2c2c32; color: #e0d8d5; }
  .voice-popover .voice-option.selected { color: #b0b0b8; font-weight: 600; }

  .voice-popover .voice-group {
    font-size: 9px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 8px 2px;
    font-weight: 600;
  }

  .voice-popover::-webkit-scrollbar { width: 3px; }
  .voice-popover::-webkit-scrollbar-thumb { background: #2c2c32; border-radius: 2px; }

  /* --- Terminal Panel --- */
  .terminal-panel {
    overflow: hidden;
    transition: height 0.3s ease;
    flex-shrink: 0;
    background: #282c34;
    border-top: 1px solid #3e4451;
    display: flex;
    flex-direction: column;
    height: 25px;
  }
  .terminal-panel.open {
    height: 35vh;
  }
  .terminal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 10px;
    background: #21252b;
    border-bottom: 1px solid #3e4451;
    cursor: pointer;
    flex-shrink: 0;
  }
  .terminal-header span {
    font-size: 11px;
    color: #888;
    font-weight: 600;
  }
  .terminal-header .term-controls button {
    background: #2c313a;
    border: 1px solid #3e4451;
    border-radius: 4px;
    font-size: 10px;
    padding: 1px 8px;
    cursor: pointer;
  }
  .terminal-header .term-controls button:hover { border-color: #4b5263; background: #3e4451; }
  .terminal-output {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px 14px;
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 10px;
    line-height: 1.4;
    color: #abb2bf;
    background: #282c34;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 60px;
    -webkit-overflow-scrolling: touch;
  }
  .terminal-output::-webkit-scrollbar { width: 3px; }
  .terminal-output::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .controls button.replay-btn {
    border-color: #333338;
    color: #9a9aa0;
  }
  .controls button.replay-btn:hover { background: #2a2a30; }
  .term-controls { display: flex; gap: 4px; align-items: center; }
  .term-controls button {
    background: #2c313a;
    border: 1px solid #3e4451;
    border-radius: 4px;
    color: #abb2bf;
    font-size: 11px;
    padding: 1px 8px;
    cursor: pointer;
    min-width: 24px;
    text-align: center;
  }
  .term-controls button:hover { color: #e5e5e5; border-color: #4b5263; background: #3e4451; }

  .term-nav {
    display: none;
    gap: 4px;
    padding: 4px 10px;
    background: #21252b;
    border-bottom: 1px solid #3e4451;
    flex-shrink: 0;
  }
  .term-nav.show { display: flex; }
  .term-nav button {
    background: #2c313a;
    border: 1px solid #3e4451;
    border-radius: 4px;
    color: #abb2bf;
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .term-nav button:hover { color: #e5e5e5; border-color: #4b5263; background: #3e4451; }
  .term-nav button:active { transform: scale(0.95); }
  .term-nav button.term-nav-enter {
    background: #e8636b;
    border-color: #e8636b;
    color: #fff;
    flex: 1;
  }
  .term-nav button.term-nav-enter:hover { background: #d4545c; }
</style>
</head>
<body>

<!-- Section 1: Header -->
<div class="header">
  <div class="status-dot green" id="statusDot"></div>
  <span class="status-text" id="statusText">Ready</span>
  <div class="svc-indicators">
    <span class="svc-label">STT</span><div class="svc-dot" id="svcWhisper" data-tip="Whisper STT"></div>
    <span class="svc-label">TTS</span><div class="svc-dot" id="svcKokoro" data-tip="Kokoro TTS"></div>
    <button class="svc-restart" id="restartBtn" data-tip="Restart Murmur server">⟳</button>
  </div>
</div>

<!-- Section 2: Mic meter -->
<div class="mic-meter" id="micMeter">
  <canvas id="micCanvas"></canvas>
</div>

<!-- Section 3: Transcript -->
<div class="transcript" id="transcript">
  <div class="conv-toolbar" id="convToolbar">
    <button id="cleanBtn" class="active" data-tip="Toggle verbose streaming output">Clean</button>
    <span class="conv-toolbar-spacer"></span>
    <button id="chatZoomOut" data-tip="Decrease font size">−</button>
    <button id="chatZoomIn" data-tip="Increase font size">+</button>
  </div>
  <div class="empty-state" id="emptyState">Press Right ⌘ or tap to talk</div>
</div>

<!-- Section 4: Talk button -->
<div class="talk-bar">

<script>

  function friendlyVoice(raw) { return VOICE_NAMES[raw] || raw; }

  // Inline murmur waveform SVG for talk button
  const MURMUR_SVG = '<svg viewBox="0 0 80 24" class="murmur-icon"><polyline points="2.0,12.0 2.6,12.2 3.3,12.2 3.9,11.8 4.5,11.6 5.2,11.6 5.8,12.0 6.4,12.6 7.1,13.5 7.7,11.1 8.3,10.2 9.0,12.3 9.6,12.7 10.2,13.3 10.9,12.1 11.5,11.5 12.1,10.5 12.8,10.7 13.4,13.8 14.0,15.2 14.7,10.5 15.3,10.0 15.9,11.2 16.6,12.0 17.2,14.1 17.8,13.1 18.5,13.0 19.1,8.7 19.7,8.9 20.4,14.8 21.0,15.7 21.6,11.3 22.3,11.0 22.9,9.5 23.5,10.9 24.2,13.4 24.8,15.0 25.4,15.2 26.1,6.6 26.7,8.3 27.3,14.2 28.0,14.8 28.6,13.4 29.2,12.5 29.9,8.8 30.5,9.1 31.1,11.2 31.8,17.7 32.4,16.5 33.0,6.0 33.7,9.3 34.3,11.4 34.9,13.6 35.6,15.4 36.2,14.5 36.8,9.9 37.5,6.2 38.1,9.1 38.7,19.7 39.4,16.1 40.0,8.4 40.6,10.7 41.3,7.9 41.9,12.2 42.5,15.2 43.2,17.0 43.8,11.7 44.4,4.8 45.1,9.2 45.7,17.3 46.3,14.1 47.0,12.8 47.6,11.8 48.2,7.2 48.9,10.5 49.5,13.3 50.1,18.3 50.8,12.4 51.4,6.4 52.0,10.3 52.7,13.4 53.3,12.9 53.9,15.2 54.6,12.6 55.2,8.6 55.8,9.0 56.5,12.2 57.1,17.8 57.7,12.1 58.4,9.7 59.0,10.9 59.6,10.6 60.3,12.4 60.9,15.1 61.5,13.4 62.2,10.2 62.8,8.6 63.4,12.0 64.1,15.4 64.7,12.0 65.3,12.4 66.0,11.0 66.6,10.0 67.2,11.8 67.9,13.9 68.5,13.8 69.1,11.2 69.8,9.8 70.4,12.0 71.0,12.8 71.7,12.2 72.3,13.1 72.9,11.5 73.6,11.0 74.2,11.5 74.8,12.6 75.5,12.8 76.1,11.8 76.7,11.7 77.4,12.0 78.0,12.0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  // Remote logging — send key client events to server for debugging

    if (ws?.readyState === WebSocket.OPEN) ws.send("log:" + msg);
