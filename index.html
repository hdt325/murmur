  const transcript = document.getElementById("transcript");
  const emptyState = document.getElementById("emptyState");
  const statusText = document.getElementById("statusText");
  const statusDot = document.getElementById("statusDot");
  const stopBtn = document.getElementById("stopBtn");
  const muteBtn = document.getElementById("muteBtn");
  const speedBtn = document.getElementById("speedBtn");
  const voiceBtn = document.getElementById("voiceBtn");
  const voicePopover = document.getElementById("voicePopover");
  const talkBtn = document.getElementById("talkBtn");
  const terminalPanel = document.getElementById("terminalPanel");
  const terminalOutput = document.getElementById("terminalOutput");
  const terminalInput = document.getElementById("textInput");
  const termSendBtn = document.getElementById("textSendBtn");
  const termClearBtn = document.getElementById("termClearBtn");
  const termZoomIn = document.getElementById("termZoomIn");
  const termZoomOut = document.getElementById("termZoomOut");
  const terminalHeader = document.getElementById("terminalHeader");
  const modeBtn = document.getElementById("modeBtn");
  const cleanBtn = document.getElementById("cleanBtn");

  // Steal focus from macOS window chrome (close button) on launch
  document.body.setAttribute("tabindex", "-1");
  document.body.focus();

  // Interaction modes: voice↔voice, text→voice, voice→text
  const MODES = [
    { id: "full",   label: "Voice", tip: "Voice mode: speak to Claude, hear responses aloud",  micOn: true,  ttsOn: true  },
    { id: "type",   label: "Type",  tip: "Type mode: type input, hear responses aloud",         micOn: false, ttsOn: true  },
    { id: "listen", label: "Read",  tip: "Read mode: speak to Claude, read responses as text",  micOn: true,  ttsOn: false },
  ];
  let modeIdx = parseInt(localStorage.getItem("murmur-mode") || "1") % MODES.length;

  let terminalOpen = localStorage.getItem("term-open") === "1";
  let termAutoScroll = true;
  let voicedOnly = localStorage.getItem("voiced-only") !== "0";
  function applyCleanMode() {
    cleanBtn.textContent = voicedOnly ? "Clean" : "Verbose";
    cleanBtn.classList.toggle("active", voicedOnly);
  }
  applyCleanMode();
  let termFontSize = parseInt(localStorage.getItem("term-font-size") || "10");

  // Restore terminal state on load
  if (terminalOpen) {
    terminalPanel.classList.add("open");
    document.getElementById("termToggleLabel").textContent = "▼ Terminal";
  }
  // Cached terminal output — rendered after ansiToHtml is defined below
  const cachedTerminal = localStorage.getItem("term-output");

  // =============================================
  // Conversation history persistence (localStorage)
  // =============================================
  const HISTORY_KEY = "murmur-history";
  const HISTORY_MAX = 100;
  let messageHistory = [];
  let historyLoaded = false;

  function loadHistory() {
    try {
      const stored = localStorage.getItem(HISTORY_KEY);
      if (stored) messageHistory = JSON.parse(stored);
    } catch {}
  }

  function saveHistory() {
    try {
      // Keep only last HISTORY_MAX messages and cap at 50KB
      const trimmed = messageHistory.slice(-HISTORY_MAX);
      const json = JSON.stringify(trimmed);
      if (json.length < 50000) localStorage.setItem(HISTORY_KEY, json);
      else localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed.slice(-30)));
    } catch {}
  }

  function addToHistory(role, text, ts) {
    // Don't duplicate if last message has same role and text
    const last = messageHistory[messageHistory.length - 1];
    if (last && last.role === role && last.text === text) return;
    messageHistory.push({ role, text, ts: ts || Date.now() });
    saveHistory();
  }

  function restoreHistory() {
    loadHistory();
    if (messageHistory.length === 0) return;
    emptyState.style.display = "none";
    for (const msg of messageHistory.slice(-50)) {
      addMessage(msg.role, msg.text, msg.ts, true);
    }
    historyLoaded = true;
  }

  restoreHistory();

  // Global state
  let ws;
  let reconnectTimer;
  let muted = false;
  let _statusDebounceTimer = null;
  let ttsMuted = false;
  let currentVoice = "";
  let thinkingBubble = null;

  // Apply saved interaction mode
  let _modeReady = false;
  function applyMode() {
    const m = MODES[modeIdx];
    modeBtn.textContent = m.label;
    modeBtn.setAttribute("data-tip", m.tip);
    muted = !m.micOn;
    ttsMuted = !m.ttsOn;
    document.getElementById("micMeter").classList.toggle("muted", muted);
    talkBtn.style.opacity = m.micOn ? "1" : "0.4";
    talkBtn.style.pointerEvents = m.micOn ? "auto" : "none";
    // Sync mute button visual
    muteBtn.classList.toggle("active", muted);
    if (ws?.readyState === WebSocket.OPEN) ws.send("mute:" + (muted ? "1" : "0"));
    if (_modeReady && muted && isRecording) stopRecording();
    localStorage.setItem("murmur-mode", String(modeIdx));
    // Refresh idle button to show mode-specific styling
    if (_modeReady && !isRecording && !talkBtn.classList.contains("speaking") &&
        !talkBtn.classList.contains("thinking") && !talkBtn.classList.contains("responding") &&
        !talkBtn.classList.contains("transcribing") && !talkBtn.classList.contains("recording")) {
      setTalkState("idle");
    }
  }
  applyMode();

  // Terminal font size init
  terminalOutput.style.fontSize = termFontSize + "px";

  // Restore cached terminal output with ANSI rendering
  if (cachedTerminal) {
    terminalOutput.innerHTML = ansiToHtml(cachedTerminal);
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
  }

  // =============================================
  // ANSI escape code to HTML parser
  // =============================================
  function ansiToHtml(text) {
    const COLORS = [
      "#000000","#990000","#00a600","#999900","#0000b2","#b200b2","#00a6b2","#bfbfbf",
      "#666666","#e50000","#00d900","#e5e500","#0000ff","#e500e5","#00e5e5","#e5e5e5"
    ];
    // 256-color palette: 0-15 standard, 16-231 color cube, 232-255 grayscale
    const palette256 = [...COLORS];
    for (let r = 0; r < 6; r++)
      for (let g = 0; g < 6; g++)
        for (let b = 0; b < 6; b++)
          palette256.push(`#${[r,g,b].map(c => (c ? c * 40 + 55 : 0).toString(16).padStart(2,"0")).join("")}`);
    for (let i = 0; i < 24; i++) {
      const v = (i * 10 + 8).toString(16).padStart(2, "0");
      palette256.push(`#${v}${v}${v}`);
    }

    let fg = null, bg = null, bold = false, dim = false, italic = false, underline = false, inverse = false;
    let out = "";
    let spanOpen = false;

    function openSpan() {
      const parts = [];
      let fgC = fg, bgC = bg;
      if (inverse) { const t = fgC; fgC = bgC || "#282c34"; bgC = t || "#abb2bf"; }
      if (fgC) parts.push("color:" + (bold && !dim ? brighten(fgC) : fgC));
      if (dim && !fgC) parts.push("opacity:0.6");
      if (bgC) parts.push("background:" + bgC);
      if (bold) parts.push("font-weight:bold");
      if (italic) parts.push("font-style:italic");
      if (underline) parts.push("text-decoration:underline");
      if (parts.length === 0) return;
      if (spanOpen) out += "</span>";
      out += `<span style="${parts.join(";")}">`;
      spanOpen = true;
    }

    function closeSpan() {
      if (spanOpen) { out += "</span>"; spanOpen = false; }
    }

    function brighten(hex) {
      const idx = COLORS.indexOf(hex);
      if (idx >= 0 && idx < 8) return COLORS[idx + 8];
      return hex;
    }

    let i = 0;
    while (i < text.length) {
      if (text.charCodeAt(i) === 0x1b && i + 1 < text.length && text[i + 1] === "[") {
        let j = i + 2;
        while (j < text.length && !((text.charCodeAt(j) >= 0x40 && text.charCodeAt(j) <= 0x7e))) j++;
        if (j >= text.length) { i++; continue; }
        const cmd = text[j];
        if (cmd === "m") {
          const paramStr = text.slice(i + 2, j);
          const codes = paramStr === "" ? [0] : paramStr.split(";").map(Number);
          let k = 0;
          while (k < codes.length) {
            const c = codes[k];
            if (c === 0) { closeSpan(); fg = bg = null; bold = dim = italic = underline = inverse = false; }
            else if (c === 1) bold = true;
            else if (c === 2) dim = true;
            else if (c === 3) italic = true;
            else if (c === 4) underline = true;
            else if (c === 7) inverse = true;
            else if (c === 22) { bold = false; dim = false; }
            else if (c === 23) italic = false;
            else if (c === 24) underline = false;
            else if (c === 27) inverse = false;
            else if (c === 39) fg = null;
            else if (c === 49) bg = null;
            else if (c >= 30 && c <= 37) fg = COLORS[c - 30];
            else if (c >= 40 && c <= 47) bg = COLORS[c - 40];
            else if (c >= 90 && c <= 97) fg = COLORS[c - 90 + 8];
            else if (c >= 100 && c <= 107) bg = COLORS[c - 100 + 8];
            else if ((c === 38 || c === 48) && k + 1 < codes.length) {
              if (codes[k + 1] === 5 && k + 2 < codes.length) {
                const idx = codes[k + 2];
                if (idx >= 0 && idx < 256) {
                  if (c === 38) fg = palette256[idx]; else bg = palette256[idx];
                }
                k += 2;
              } else if (codes[k + 1] === 2 && k + 4 < codes.length) {
                const hex = `#${codes[k+2].toString(16).padStart(2,"0")}${codes[k+3].toString(16).padStart(2,"0")}${codes[k+4].toString(16).padStart(2,"0")}`;
                if (c === 38) fg = hex; else bg = hex;
                k += 4;
              }
            }
            k++;
          }
          if (fg || bg || bold || dim || italic || underline || inverse) openSpan();
        }
        i = j + 1;
        continue;
      }
      // Escape HTML entities
      const ch = text[i];
      if (ch === "<") out += "&lt;";
      else if (ch === ">") out += "&gt;";
      else if (ch === "&") out += "&amp;";
      else out += ch;
      i++;
    }
    closeSpan();
    return out;
  }

  // =============================================
  // Status dot + text state management
  // =============================================
  function setHeaderState(state, text) {
    statusText.textContent = text;
    statusDot.className = "status-dot";

    switch (state) {
      case "ready":
      case "idle":
        statusDot.classList.add("green");
        break;
      case "recording":
        statusDot.classList.add("red");
        break;
      case "transcribing":
        statusDot.classList.add("orange");
        break;
      case "thinking":
      case "responding":
        statusDot.classList.add("yellow");
        break;
      case "speaking":
        statusDot.classList.add("gold");
        break;
      case "disconnected":
        statusDot.classList.add("gray");
        break;
    }
  }

  // =============================================
  // Thinking placeholder bubble
  // =============================================
  function showThinkingBubble() {
    removeThinkingBubble();
    const div = document.createElement("div");
    div.className = "msg thinking";
    div.id = "thinkingBubble";
    div.innerHTML = `<div class="meta"><span class="role">Claude</span></div><div class="thinking-dots"><span></span><span></span><span></span></div>`;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
    thinkingBubble = div;
  }

  function removeThinkingBubble() {
    if (thinkingBubble) {
      thinkingBubble.remove();
      thinkingBubble = null;
    }
    // Also remove by ID in case reference was lost
    const existing = document.getElementById("thinkingBubble");
    if (existing) existing.remove();
  }

  // =============================================
  // Live Mic Meter
  // =============================================
  const micCanvas = document.getElementById("micCanvas");
  const micCtx = micCanvas.getContext("2d");
  const micMeter = document.getElementById("micMeter");
  let micStream = null;
  let micAnalyser = null;
  let micDataArray = null;
  let micAnimFrame = null;
  let micSmoothLevel = 0;
  let micPeakDecay = 0;
  let talkWaveFrame = null;
  const talkWaveCanvas = document.getElementById("talkWaveCanvas");
  const talkWaveCtx = talkWaveCanvas.getContext("2d");

  let ttsAudioCtx = null; // Shared AudioContext for TTS playback (unlocked via mic permission)

  function initMicMeter() {
    if (micStream) return;
    console.log("[mic] Requesting mic access...");
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }).then((stream) => {
      console.log("[mic] Mic access granted");
      micStream = stream;
      const audioCtx = new AudioContext();
      ttsAudioCtx = audioCtx; // Share for TTS playback
      const source = audioCtx.createMediaStreamSource(stream);
      const micGain = audioCtx.createGain();
      micGain.gain.value = 3.0; // Boost mic signal for analyser
      micAnalyser = audioCtx.createAnalyser();
      micAnalyser.fftSize = 256;
      micAnalyser.smoothingTimeConstant = 0.4;
      source.connect(micGain);
      micGain.connect(micAnalyser);
      micDataArray = new Float32Array(micAnalyser.fftSize);

      // Rolling audio buffer: captures last ~400ms of mic audio continuously
      // so we can prepend pre-trigger speech when recording starts
      const bufferNode = audioCtx.createScriptProcessor(4096, 1, 1);
      const sampleRate = audioCtx.sampleRate;
      const PRE_BUFFER_SECONDS = 0.4;
      const maxSamples = Math.ceil(sampleRate * PRE_BUFFER_SECONDS);
      let ringBuffer = new Float32Array(maxSamples);
      let ringWritePos = 0;
      let ringFilled = false;
      bufferNode.onaudioprocess = (e) => {
        if (ttsPlaying) return; // Don't buffer during TTS playback
        const input = e.inputBuffer.getChannelData(0);
        for (let i = 0; i < input.length; i++) {
          ringBuffer[ringWritePos] = input[i];
          ringWritePos++;
          if (ringWritePos >= maxSamples) {
            ringWritePos = 0;
            ringFilled = true;
          }
        }
      };
      source.connect(bufferNode);
      bufferNode.connect(audioCtx.destination); // Required for ScriptProcessor to fire

      // Expose buffer snapshot function globally
      window._getPreBuffer = () => {
        const len = ringFilled ? maxSamples : ringWritePos;
        const out = new Float32Array(len);
        if (ringFilled) {
          // Copy from writePos to end, then start to writePos
          const tail = maxSamples - ringWritePos;
          out.set(ringBuffer.subarray(ringWritePos, maxSamples), 0);
          out.set(ringBuffer.subarray(0, ringWritePos), tail);
        } else {
          out.set(ringBuffer.subarray(0, ringWritePos));
        }
        return { samples: out, sampleRate };
      };

      drawMicMeter();
      // Start auto-listen now that mic is ready
      if (autoListenEnabled && !autoListenInterval) startAutoListen();
    }).catch((err) => {
      console.error("[mic] Mic access failed:", err);
    });
  }

  function drawMicMeter() {
    const W = micCanvas.width;
    const H = micCanvas.height;
    micCtx.clearRect(0, 0, W, H);

    if (micAnalyser) {
      micAnalyser.getFloatTimeDomainData(micDataArray);
      let sum = 0;
      for (let i = 0; i < micDataArray.length; i++) sum += micDataArray[i] * micDataArray[i];
      let rms = Math.sqrt(sum / micDataArray.length);
      let level = Math.min(1, rms * 4);
      micSmoothLevel = micSmoothLevel * 0.6 + level * 0.4;
      if (micSmoothLevel > micPeakDecay) micPeakDecay = micSmoothLevel;
      else micPeakDecay *= 0.97;

      const pad = 2;
      const barMaxW = W - pad * 2;
      const barH = H - 1;
      const barY = 0;

      micCtx.fillStyle = "#151518";
      micCtx.fillRect(pad, barY, barMaxW, barH);

      const barW = micSmoothLevel * barMaxW;
      if (barW > 1) {
        const grad = micCtx.createLinearGradient(pad, 0, pad + barMaxW, 0);
        grad.addColorStop(0, "#2ecc71");
        grad.addColorStop(0.6, "#2ecc71");
        grad.addColorStop(0.8, "#f1c40f");
        grad.addColorStop(1.0, "#e74c3c");
        micCtx.fillStyle = grad;
        micCtx.fillRect(pad, barY, barW, barH);
      }

      if (micPeakDecay > 0.02) {
        const peakX = pad + micPeakDecay * barMaxW;
        micCtx.fillStyle = "rgba(255,255,255,0.5)";
        micCtx.fillRect(peakX - 1, barY, 1, barH);
      }
    }

    micAnimFrame = requestAnimationFrame(drawMicMeter);
  }

  let talkWaveColor = "#e74c3c";
  let talkWaveAnalyserRef = null;
  let talkWaveDataRef = null;

  function drawTalkWaveform() {
    const analyser = talkWaveAnalyserRef;
    const dataArray = talkWaveDataRef;
    if (!analyser || !dataArray) { talkWaveFrame = null; return; }
    const canvas = talkWaveCanvas;
    const ctx = talkWaveCtx;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) { talkWaveFrame = null; return; }
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    analyser.getFloatTimeDomainData(dataArray);
    ctx.clearRect(0, 0, W, H);

    // Compact centered waveform — similar style to the Murmur icon
    const NUM_BARS = 40;
    const barGap = 2;
    const barWidth = 2;
    const totalWidth = NUM_BARS * (barWidth + barGap) - barGap;
    const startX = (W - totalWidth) / 2;
    const midY = H / 2;
    const maxAmp = H * 0.4;
    const samplesPerBar = Math.floor(dataArray.length / NUM_BARS);

    ctx.fillStyle = talkWaveColor;
    ctx.lineCap = "round";

    for (let i = 0; i < NUM_BARS; i++) {
      let sum = 0;
      const offset = i * samplesPerBar;
      for (let j = 0; j < samplesPerBar; j++) {
        const v = dataArray[offset + j];
        sum += v * v;
      }
      let rms = Math.sqrt(sum / samplesPerBar);
      let barH = Math.max(2, rms * maxAmp * 8);
      const x = startX + i * (barWidth + barGap);
      const y = midY - barH / 2;
      ctx.beginPath();
      ctx.roundRect(x, y, barWidth, barH, 1);
      ctx.fill();
    }

    talkWaveFrame = requestAnimationFrame(drawTalkWaveform);
  }

  function startTalkWaveform(color, analyser, dataArray) {
    talkWaveColor = color || "#e74c3c";
    talkWaveAnalyserRef = analyser || micAnalyser;
    talkWaveDataRef = dataArray || micDataArray;
    talkWaveCanvas.style.display = "block";
    if (!talkWaveFrame) talkWaveFrame = requestAnimationFrame(drawTalkWaveform);
  }

  function stopTalkWaveform() {
    talkWaveCanvas.style.display = "none";
    if (talkWaveFrame) { cancelAnimationFrame(talkWaveFrame); talkWaveFrame = null; }
    talkWaveAnalyserRef = null;
    talkWaveDataRef = null;
  }

  // Auto-init mic on load, click mic meter or talk button as fallback
  setTimeout(initMicMeter, 500);
  micMeter.addEventListener("click", initMicMeter);

  function resizeMicCanvas() {
    const rect = micMeter.getBoundingClientRect();
    micCanvas.width = rect.width * devicePixelRatio;
    micCanvas.height = rect.height * devicePixelRatio;
    micCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    micCanvas.style.width = rect.width + "px";
    micCanvas.style.height = rect.height + "px";
  }
  resizeMicCanvas();
  window.addEventListener("resize", resizeMicCanvas);

  // =============================================
  // Speed cycle
  // =============================================
  const SPEEDS = [0.5, 1, 1.25, 1.5, 2, 2.5, 3];
  let speedIdx = 1;
  speedBtn.textContent = SPEEDS[speedIdx] + "x";

  // =============================================
  // Time formatting
  // =============================================
  function fmtTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });
  }

  // =============================================
  // WebSocket
  // =============================================
  function connect() {
    if (!location.host) { console.warn("[ws] No host, skipping connect"); return; }
    const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${wsProto}//${location.host}`);

    ws.onopen = () => {
      setHeaderState("ready", "Ready");
      clearTimeout(reconnectTimer);
      // Check if page is stale and needs reload
      fetch("/version").then(r => r.json()).then(d => {
        if (d.version && d.version > PAGE_VERSION) {
          console.log(`[version] Server v${d.version} > page v${PAGE_VERSION}, reloading`);
          location.reload();
        }
      }).catch(() => {});
    };

    ws.onclose = () => {
      setHeaderState("disconnected", "Disconnected");
      reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (e) => {
      // Binary message = TTS audio streamed from server
      if (e.data instanceof Blob) {
        playTtsAudio(e.data);
        return;
      }
      const msg = JSON.parse(e.data);

      if (msg.type === "status") {
        const phase = msg.phase || "idle";

        // Debounce rapid phase transitions — skip transient states
        // that would only flash for <300ms (listening→recording→transcribing)
        if (_statusDebounceTimer) clearTimeout(_statusDebounceTimer);
        const applyStatus = () => {
          if (muted && msg.micActive) {
            setHeaderState("idle", "Muted");
          } else if (phase === "speaking") {
            setHeaderState("speaking", "Speaking");
            setTalkState("speaking");
          } else if (phase === "recording") {
            setHeaderState("recording", "Recording");
          } else if (phase === "transcribing") {
            setHeaderState("transcribing", "Transcribing...");
          } else if (phase === "thinking") {
            setHeaderState("thinking", "Claude is thinking...");
            setTalkState("thinking");
          } else if (phase === "responding") {
            setHeaderState("responding", "Claude is responding...");
          } else if (phase === "standby") {
            setHeaderState("ready", 'Say "Hey Claude"');
          } else if (phase === "listening") {
            setHeaderState("ready", "Listening");
          } else {
            setHeaderState("ready", "Ready");
          }
        };
        // High-priority states apply immediately; transient ones debounce
        if (["speaking", "thinking", "responding", "transcribing"].includes(phase)) {
          applyStatus();
        } else {
          _statusDebounceTimer = setTimeout(applyStatus, 300);
        }
      }

      if (msg.type === "settings") {
        if (msg.speed) {
          const s = parseFloat(msg.speed);
          const idx = SPEEDS.indexOf(s);
          if (idx >= 0) {
            speedIdx = idx;
            speedBtn.textContent = SPEEDS[speedIdx] + "x";
          }
        }
        if (msg.voice) {
          currentVoice = msg.voice;
          voiceBtn.textContent = friendlyVoice(msg.voice);
          updateVoiceSelection();
        }
        if (msg.muted === "1" && !muted) {
          // Server says muted — sync only if we're in a voice-input mode
          modeIdx = 1; // Switch to type mode
          applyMode();
        }
      }

      if (msg.type === "transcription") {
        // Skip historic messages from server if we already restored from localStorage
        if (msg.historic && historyLoaded) return;
        // Always show partial messages for real-time feedback
        removeThinkingBubble();
        emptyState.style.display = "none";
        if (msg.partial && msg.role === "assistant") {
          // In clean mode, skip verbose streaming output
          if (!voicedOnly) updatePartialMessage(msg.text, msg.ts);
        } else {
          // Final message — remove partials and add permanent bubbles
          removePartialMessage();
          addMessage(msg.role, msg.text, msg.ts);
        }
      }

      if (msg.type === "voice_status") {
        handleVoiceStatus(msg.state);
      }

      if (msg.type === "services") {
        const svcWhisper = document.getElementById("svcWhisper");
        const svcKokoro = document.getElementById("svcKokoro");
        svcWhisper.className = "svc-dot " + (msg.whisper ? "up" : "down");
        svcKokoro.className = "svc-dot " + (msg.kokoro ? "up" : "down");
        svcWhisper.dataset.tip = msg.whisper ? "Whisper STT: running" : "Whisper STT: offline";
        svcKokoro.dataset.tip = msg.kokoro ? "Kokoro TTS: running" : "Kokoro TTS: offline";
      }

      if (msg.type === "signal") {
        if (msg.name === "voice-stop") {
          setHeaderState("ready", "Ready");
          setTalkState("idle");
          removeThinkingBubble();
        }
      }

      if (msg.type === "tts_stop") {
        stopTtsPlayback();
      }

      if (msg.type === "interactive_prompt") {
        const termNav = document.getElementById("termNav");
        if (msg.active) {
          // Open terminal and show nav buttons
          if (!terminalOpen) { terminalOpen = true; terminalPanel.classList.add("open"); document.getElementById("termToggleLabel").textContent = "▼ Terminal"; localStorage.setItem("term-open", "1"); }
          termNav.classList.add("show");
          terminalOutput.scrollTop = terminalOutput.scrollHeight;
        } else {
          termNav.classList.remove("show");
        }
      }

      if (msg.type === "terminal") {
        const prevScroll = terminalOutput.scrollTop;
        terminalOutput.innerHTML = ansiToHtml(msg.text);
        localStorage.setItem("term-output", msg.text);
        if (termAutoScroll) {
          terminalOutput.scrollTop = terminalOutput.scrollHeight;
        } else {
          terminalOutput.scrollTop = prevScroll;
        }
      }
    };
  }

  function addMessage(role, text, ts, fromRestore) {
    console.log(`[transcript] Adding ${role} message: "${text.slice(0, 60)}"`);

    // Split assistant messages into paragraph bubbles
    const paragraphs = (role === "assistant")
      ? text.split(/\n\n+/).map(p => p.trim()).filter(p => p.length > 0)
      : [text];

    const timeStr = fmtTime(ts || Date.now());

    paragraphs.forEach((para, i) => {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const metaHtml = i === 0
        ? `<div class="meta"><span class="role">${role === "user" ? "You" : "Claude"}</span><span class="time">${timeStr}</span></div>`
        : "";
      div.innerHTML = metaHtml + escapeHtml(para);

      div.addEventListener("click", () => {
        navigator.clipboard.writeText(para).then(() => {
          const toast = document.createElement("span");
          toast.className = "copied-toast";
          toast.textContent = "Copied";
          div.appendChild(toast);
          setTimeout(() => toast.remove(), 800);
        });
      });

      if (role === "assistant") {
        const wrap = document.createElement("div");
        wrap.className = "msg-wrap";
        const replayBtn = document.createElement("button");
        replayBtn.className = "msg-replay";
        replayBtn.textContent = "↻";
        replayBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          if (ws && ws.readyState === WebSocket.OPEN) ws.send("replay:" + para);
        });
        wrap.appendChild(div);
        wrap.appendChild(replayBtn);
        transcript.appendChild(wrap);
      } else {
        transcript.appendChild(div);
      }
    });

    transcript.scrollTop = transcript.scrollHeight;

    while (transcript.querySelectorAll(".msg").length > 80) {
      transcript.querySelector(".msg").remove();
    }

    // Save to localStorage (skip if restoring from history)
    if (!fromRestore) addToHistory(role, text, ts);
  }

  function updatePartialMessage(text, ts) {
    // Remove old partial bubbles
    document.querySelectorAll(".partial-msg").forEach(el => el.remove());

    const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(p => p.length > 0);
    const timeStr = fmtTime(ts || Date.now());

    paragraphs.forEach((para, i) => {
      const div = document.createElement("div");
      div.className = "msg assistant partial-msg";
      div.style.opacity = "0.8";
      const metaHtml = i === 0
        ? `<div class="meta"><span class="role">Claude</span><span class="time">${timeStr}</span></div>`
        : "";
      div.innerHTML = metaHtml + escapeHtml(para);
      transcript.appendChild(div);
    });
    transcript.scrollTop = transcript.scrollHeight;
  }

  function removePartialMessage() {
    document.querySelectorAll(".partial-msg").forEach(el => el.remove());
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  let activeSpeakBubbles = [];
  let activeSpeakIdx = 0;

  function clearBubbleHighlights() {
    document.querySelectorAll(".msg.bubble-active").forEach(el => el.classList.remove("bubble-active"));
    activeSpeakBubbles = [];
    activeSpeakIdx = 0;
  }

  function startBubbleHighlight() {
    clearBubbleHighlights();
    // Collect all consecutive assistant bubbles from the end
    const all = Array.from(document.querySelectorAll(".msg"));
    const bubbles = [];
    for (let i = all.length - 1; i >= 0; i--) {
      if (all[i].classList.contains("assistant")) bubbles.unshift(all[i]);
      else break;
    }
    activeSpeakBubbles = bubbles;
    activeSpeakIdx = 0;
    if (bubbles.length > 0) {
      bubbles[0].classList.add("bubble-active");
      bubbles[0].scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }

  function advanceBubbleHighlight() {
    if (activeSpeakBubbles.length === 0) return;
    // Remove current highlight
    if (activeSpeakIdx < activeSpeakBubbles.length) {
      activeSpeakBubbles[activeSpeakIdx].classList.remove("bubble-active");
    }
    activeSpeakIdx++;
    // Highlight next bubble if available
    if (activeSpeakIdx < activeSpeakBubbles.length) {
      activeSpeakBubbles[activeSpeakIdx].classList.add("bubble-active");
      activeSpeakBubbles[activeSpeakIdx].scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }

  // =============================================
  // Talk button state management
  // =============================================
  function setTalkState(state) {
    talkBtn.className = "";
    stopTalkWaveform();
    clearBubbleHighlights();

    switch (state) {
      case "idle": {
        talkBtn.innerHTML = '';
        talkBtn.appendChild(talkWaveCanvas);
        talkBtn.insertAdjacentHTML('beforeend', MURMUR_SVG);
        const hint = document.createElement("span");
        hint.className = "talk-idle-hint";
        const mode = MODES[modeIdx];
        if (mode.id === "type") {
          hint.textContent = "Type mode — mic off";
        } else if (mode.id === "listen") {
          hint.textContent = "Read mode — voice in, text out";
        } else {
          hint.textContent = "Tap or press Right ⌘ to talk";
        }
        talkBtn.appendChild(hint);
        talkBtn.className = "idle-state";
        if (mode.id === "listen") talkBtn.classList.add("mode-read");
        if (mode.id === "type") talkBtn.classList.add("mode-type");
        talkBtn.setAttribute("data-tip", mode.tip);
        setHeaderState("ready", mode.id === "type" ? "Type mode" : "Ready");
        // Show subtle mic level on idle button (red palette, low opacity)
        if (mode.micOn && micAnalyser && micDataArray) {
          startTalkWaveform("#e74c3c44", micAnalyser, micDataArray);
        }
        break;
      }
      case "recording":
        talkBtn.innerHTML = '';
        talkBtn.appendChild(talkWaveCanvas);
        const label = document.createElement("span");
        label.className = "talk-wave-label";
        label.textContent = "Listening...";
        talkBtn.appendChild(label);
        talkBtn.className = "recording";
        startTalkWaveform("#e74c3c", micAnalyser, micDataArray);
        setHeaderState("recording", "Recording");
        break;
      case "transcribing":
        talkBtn.textContent = "";
        talkBtn.appendChild(talkWaveCanvas);
        talkBtn.insertAdjacentText('beforeend', "Transcribing...");
        talkBtn.className = "transcribing";
        setHeaderState("transcribing", "Transcribing...");
        break;
      case "thinking":
        talkBtn.textContent = "";
        talkBtn.appendChild(talkWaveCanvas);
        talkBtn.insertAdjacentText('beforeend', "Claude is thinking... (tap to stop)");
        talkBtn.className = "thinking";
        setHeaderState("thinking", "Claude is thinking...");
        showThinkingBubble();
        break;
      case "responding":
        talkBtn.textContent = "";
        talkBtn.appendChild(talkWaveCanvas);
        talkBtn.insertAdjacentText('beforeend', "Claude is responding... (tap to stop)");
        talkBtn.className = "responding";
        setHeaderState("responding", "Claude is responding...");
        break;
      case "speaking": {
        talkBtn.innerHTML = '';
        talkBtn.appendChild(talkWaveCanvas);
        const spkLabel = document.createElement("span");
        spkLabel.className = "talk-wave-label";
        spkLabel.textContent = "Speaking... (tap to stop)";
        talkBtn.appendChild(spkLabel);
        talkBtn.className = "speaking";
        // TTS analyser may not exist yet — retry briefly until it's created
        const tryStartTtsWave = (attempts) => {
          if (ttsAnalyser && ttsDataArray) {
            startTalkWaveform("#c9b07c", ttsAnalyser, ttsDataArray);
          } else if (attempts > 0 && talkBtn.classList.contains("speaking")) {
            setTimeout(() => tryStartTtsWave(attempts - 1), 50);
          }
        };
        tryStartTtsWave(20);
        startBubbleHighlight();
        setHeaderState("speaking", "Speaking");
        removeThinkingBubble();
        break;
      }
    }
  }

  // =============================================
  // Handle voice_status from server
  // =============================================
  function handleVoiceStatus(state) {
    console.log(`[voice_status] ${state}`);
    if (state === "transcribing") {
      setTalkState("transcribing");
    } else if (state === "thinking") {
      setTalkState("thinking");
    } else if (state === "responding") {
      setTalkState("responding");
    } else if (state === "speaking") {
      ttsStartedAt = Date.now();
      idleFromTtsCompletion = false;
      pendingIdle = false; // New audio coming, cancel deferred idle
      setTalkState("speaking");
    } else if (state === "idle") {
      // If TTS is still playing or just finished (server may be synthesizing next chunk), defer idle
      const recentTts = Date.now() - ttsEndedAt < 800;
      if (ttsPlaying || (recentTts && talkBtn.classList.contains("speaking"))) {
        rlog(`[voice_status] idle deferred — ttsPlaying=${ttsPlaying} recentTts=${recentTts}`);
        pendingIdle = true;
        // Safety: if no new speaking arrives within 2s, go idle anyway
        setTimeout(() => { if (pendingIdle && !ttsPlaying) applyIdleState(); }, 2000);
        return;
      }
      applyIdleState();
    } else if (state === "sent") {
      setTalkState("thinking");
    } else if (state === "blank") {
      talkBtn.textContent = "No speech detected";
      talkBtn.className = "";
      setTimeout(() => setTalkState("idle"), 1500);
    } else if (state === "wake_no_match") {
      setTalkState("idle");
    } else if (state === "wake_matched") {
      setTalkState("thinking");
    }
  }
  let conversationHotTimer = null;

  // =============================================
  // Controls
  // =============================================
  stopBtn.addEventListener("click", () => {
    idleFromTtsCompletion = false; // Prevent beep after manual stop
    stopTtsPlayback();
    if (ws?.readyState === WebSocket.OPEN) ws.send("stop");
    setTalkState("idle");
    removeThinkingBubble();
  });

  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.classList.toggle("active", muted);
    document.getElementById("micMeter").classList.toggle("muted", muted);
    talkBtn.style.opacity = muted ? "0.4" : "1";
    talkBtn.style.pointerEvents = muted ? "none" : "auto";
    if (ws?.readyState === WebSocket.OPEN) ws.send("mute:" + (muted ? "1" : "0"));
    if (muted && _modeReady && isRecording) stopRecording();
  });

  modeBtn.addEventListener("click", () => {
    modeIdx = (modeIdx + 1) % MODES.length;
    applyMode();
    const m = MODES[modeIdx];
    setHeaderState("idle", m.micOn ? "Ready" : "Type mode");
  });

  speedBtn.addEventListener("click", () => {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    speedBtn.textContent = SPEEDS[speedIdx] + "x";
    if (ws?.readyState === WebSocket.OPEN) ws.send("speed:" + SPEEDS[speedIdx]);
  });

  cleanBtn.addEventListener("click", () => {
    voicedOnly = !voicedOnly;
    localStorage.setItem("voiced-only", voicedOnly ? "1" : "0");
    applyCleanMode();
  });

  // Voice selection
  voiceBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    voicePopover.classList.toggle("show");
  });

  document.addEventListener("click", (e) => {
    if (!voicePopover.contains(e.target) && e.target !== voiceBtn) {
      voicePopover.classList.remove("show");
    }
  });

  voicePopover.addEventListener("click", (e) => {
    const option = e.target.closest(".voice-option");
    if (!option) return;
    const voice = option.dataset.voice;
    currentVoice = voice;
    voiceBtn.textContent = friendlyVoice(voice);
    voicePopover.classList.remove("show");
    updateVoiceSelection();
    if (ws?.readyState === WebSocket.OPEN) ws.send("voice:" + voice);
  });

  // Store original popover labels (set from HTML)
  const voiceLabels = {};
  voicePopover.querySelectorAll(".voice-option").forEach(el => {
    voiceLabels[el.dataset.voice] = el.textContent;
  });

  function updateVoiceSelection() {
    voicePopover.querySelectorAll(".voice-option").forEach(el => {
      const v = el.dataset.voice;
      const isSel = v === currentVoice;
      el.classList.toggle("selected", isSel);
      el.textContent = (isSel ? "✓ " : "") + (voiceLabels[v] || v);
    });
  }

  // =============================================
  // Voice recording (direct voice input)
  // =============================================
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  _modeReady = true;
  let silenceTimer = null;
  let silenceStart = 0;
  const SILENCE_THRESHOLD = 0.015;
  const SILENCE_DURATION = 1500;
  const MIN_RECORDING_MS = 500;
  let recordingStartTime = 0;

  // Auto-listen
  let autoListenEnabled = true;
  let autoListenActive = false;
  let speechConfirmStart = 0;
  const SPEECH_THRESHOLD = 0.002;  // Very low threshold — ffmpeg loudnorm handles quiet audio
  const SPEECH_CONFIRM_MS = 0;     // No confirmation delay — start recording immediately on speech
  let conversationHot = false;     // After Claude speaks, next speech goes direct (no wake word)
  let ttsStartedAt = 0;
  let ttsEndedAt = 0;
  let idleFromTtsCompletion = false; // Track whether idle came from successful TTS completion
  let pendingIdle = false; // Deferred idle — waiting for TTS to finish

  function applyIdleState() {
    pendingIdle = false;
    conversationHot = true;
    if (conversationHotTimer) clearTimeout(conversationHotTimer);
    conversationHotTimer = setTimeout(() => { conversationHot = false; }, 30000);
    rlog(`[voice_status] idle — ttsPlaying=${ttsPlaying} ttsEndedAt=${Date.now()-ttsEndedAt}ms ago idleFromTts=${idleFromTtsCompletion} micAnalyser=${!!micAnalyser} autoListen=${!!autoListenInterval} isRec=${isRecording}`);
    if (idleFromTtsCompletion && !isRecording && !muted) {
      if (ttsAudioCtx && ttsAudioCtx.state === "running") {
        const osc = ttsAudioCtx.createOscillator();
        const gain = ttsAudioCtx.createGain();
        osc.connect(gain);
        gain.connect(ttsAudioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.08;
        gain.gain.exponentialRampToValueAtTime(0.001, ttsAudioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(ttsAudioCtx.currentTime + 0.15);
      }
    }
    idleFromTtsCompletion = false;
    setTalkState("idle");
  }
  const TTS_ECHO_COOLDOWN = 150;   // 150ms cooldown after TTS ends (echoCancellation handles the rest)

  async function ensureMicStream() {
    if (micStream) return micStream;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
    micStream = stream;
    initMicMeter();
    return stream;
  }

  // Encode Float32 PCM samples to a WAV Blob
  function encodeWavBlob(samples, sampleRate) {
    const numChannels = 1;
    const bitsPerSample = 16;
    const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
    const blockAlign = numChannels * (bitsPerSample / 8);
    const dataSize = samples.length * (bitsPerSample / 8);
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);
    // RIFF header
    const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    writeStr(0, "RIFF");
    view.setUint32(4, 36 + dataSize, true);
    writeStr(8, "WAVE");
    writeStr(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeStr(36, "data");
    view.setUint32(40, dataSize, true);
    // PCM samples
    let offset = 44;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return new Blob([buffer], { type: "audio/wav" });
  }

  async function startRecording(isAutoListen) {
    if (isRecording) return;
    console.log(`[rec] Starting recording (autoListen=${isAutoListen})`);

    // Grab pre-buffer snapshot before recording starts
    let preBufferBlob = null;
    if (isAutoListen && window._getPreBuffer) {
      const { samples, sampleRate } = window._getPreBuffer();
      if (samples.length > 0) {
        preBufferBlob = encodeWavBlob(samples, sampleRate);
        rlog(`[rec] Pre-buffer captured: ${samples.length} samples (${(samples.length / sampleRate * 1000).toFixed(0)}ms)`);
      }
    }

    try {
      const stream = await ensureMicStream();

      mediaRecorder = new MediaRecorder(stream, {
        mimeType: MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : "audio/webm",
      });

      audioChunks = [];
      autoListenActive = !!isAutoListen;

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        const recBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        if (preBufferBlob) {
          // Send both pre-buffer (WAV) and recording (WebM) — server combines them
          sendAudioToServer(recBlob, preBufferBlob);
        } else {
          sendAudioToServer(recBlob);
        }
        autoListenActive = false;
      };

      mediaRecorder.start(100);
      isRecording = true;
      recordingStartTime = Date.now();

      setTalkState("recording");
      startSilenceDetection();

    } catch (err) {
      console.error("Mic access failed:", err);
      talkBtn.textContent = "Mic access denied";
      talkBtn.className = "";
      setTimeout(() => setTalkState("idle"), 2000);
    }
  }

  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    console.log("[rec] Stopping recording");
    isRecording = false;
    stopSilenceDetection();

    if (mediaRecorder.state === "recording") {
      mediaRecorder.stop();
    }

    setTalkState("transcribing");
  }

  function startSilenceDetection() {
    silenceStart = 0;

    function checkSilence() {
      if (!isRecording) return;

      if (micAnalyser && micDataArray) {
        micAnalyser.getFloatTimeDomainData(micDataArray);
        let sum = 0;
        for (let i = 0; i < micDataArray.length; i++) sum += micDataArray[i] * micDataArray[i];
        const rms = Math.sqrt(sum / micDataArray.length);
        const elapsed = Date.now() - recordingStartTime;

        if (rms < SILENCE_THRESHOLD && elapsed > MIN_RECORDING_MS) {
          if (silenceStart === 0) silenceStart = Date.now();
          else if (Date.now() - silenceStart > SILENCE_DURATION) {
            stopRecording();
            return;
          }
        } else {
          silenceStart = 0;
        }
      }

      silenceTimer = setTimeout(checkSilence, 100);
    }

    silenceTimer = setTimeout(checkSilence, MIN_RECORDING_MS);
  }

  function stopSilenceDetection() {
    if (silenceTimer) {
      clearTimeout(silenceTimer);
      silenceTimer = null;
    }
  }

  function sendAudioToServer(blob, preBufferBlob) {
    console.log(`[send] Sending ${blob.size} bytes to server (direct)` + (preBufferBlob ? ` + ${preBufferBlob.size} pre-buffer` : ""));
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.error("[send] WebSocket not connected!");
      talkBtn.textContent = "Not connected";
      setTimeout(() => setTalkState("idle"), 1500);
      return;
    }
    if (preBufferBlob) {
      // Signal pre-buffer, then send WAV pre-buffer, then main WebM audio
      ws.send("voice:prebuffer");
      preBufferBlob.arrayBuffer().then((buf) => {
        ws.send(buf);
        blob.arrayBuffer().then((buf2) => ws.send(buf2));
      });
    } else {
      blob.arrayBuffer().then((buffer) => ws.send(buffer));
    }
  }

  function sendAudioForWakeCheck(blob) {
    console.log(`[send] Sending ${blob.size} bytes to server (wake check)`);
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.error("[send] WebSocket not connected!");
      setTalkState("idle");
      return;
    }
    ws.send("voice:wake_check");
    blob.arrayBuffer().then((buffer) => ws.send(buffer));
  }

  // =============================================
  // TTS Audio Playback (streamed from server)
  // =============================================
  // Uses Web Audio API (decodeAudioData) as primary — works on iOS because the
  // AudioContext is already unlocked by the mic permission grant.
  // Falls back to HTML Audio element if Web Audio fails.
  let ttsCurrentSource = null; // Web Audio BufferSourceNode
  let ttsPlaybackTimer = null;
  let ttsPlaying = false;
  let ttsAnalyser = null;
  let ttsDataArray = null;
  let ttsGainNode = null;

  function playTtsAudio(blob) {
    // In text-out mode, skip TTS playback entirely
    if (ttsMuted) {
      rlog(`[tts] Skipping TTS (${blob.size} bytes) — text-out mode`);
      if (ws && ws.readyState === WebSocket.OPEN) ws.send("tts_done");
      return;
    }
    // If user is currently recording, skip TTS — don't interrupt them
    // Their new input will trigger a fresh response anyway
    if (isRecording) {
      rlog(`[tts] Skipping TTS (${blob.size} bytes) — user is recording`);
      // Tell server we're "done" so it doesn't wait for playback
      if (ws && ws.readyState === WebSocket.OPEN) ws.send("tts_done");
      return;
    }

    // Stop any current playback without sending tts_done (we're replacing)
    stopTtsPlaybackInternal(false);

    rlog(`[tts] Received audio: ${blob.size} bytes`);

    let rawBuffer = null; // Store buffer for fallback path
    blob.arrayBuffer().then(async buffer => {
      rawBuffer = buffer;
      // Try Web Audio API first (works on iOS with mic-unlocked AudioContext)
      if (ttsAudioCtx) {
        rlog(`[tts] AudioContext state: ${ttsAudioCtx.state}, sampleRate: ${ttsAudioCtx.sampleRate}`);
        // Resume AudioContext if suspended (iOS suspends until user gesture)
        if (ttsAudioCtx.state === "suspended") {
          console.log("[tts] Resuming suspended AudioContext");
          await ttsAudioCtx.resume();
        }
        return ttsAudioCtx.decodeAudioData(buffer.slice(0)).then(audioBuffer => {
          rlog(`[tts] Decoded: ${audioBuffer.duration.toFixed(1)}s, ${audioBuffer.numberOfChannels}ch, ${audioBuffer.sampleRate}Hz`);
          // Check if we were stopped/replaced while decoding
          if (ttsCurrentSource === "cancelled") { console.log("[tts] Cancelled during decode"); ttsCurrentSource = null; return; }
          const source = ttsAudioCtx.createBufferSource();
          source.buffer = audioBuffer;
          if (!ttsAnalyser) {
            ttsGainNode = ttsAudioCtx.createGain();
            ttsGainNode.gain.value = 2.0;
            ttsAnalyser = ttsAudioCtx.createAnalyser();
            ttsAnalyser.fftSize = 256;
            ttsAnalyser.smoothingTimeConstant = 0.3;
            ttsDataArray = new Float32Array(ttsAnalyser.fftSize);
            ttsGainNode.connect(ttsAnalyser);
            ttsAnalyser.connect(ttsAudioCtx.destination);
          }
          source.connect(ttsGainNode);
          ttsCurrentSource = source;
          ttsPlaying = true;

          source.onended = () => {
            rlog(`[tts] onended fired — played ${audioBuffer.duration.toFixed(1)}s`);
            ttsPlaying = false;
            ttsCurrentSource = null;
            if (ttsPlaybackTimer) { clearTimeout(ttsPlaybackTimer); ttsPlaybackTimer = null; }
            ttsEndedAt = Date.now();
            idleFromTtsCompletion = true;
            advanceBubbleHighlight();
            if (ws?.readyState === WebSocket.OPEN) ws.send("tts_done");
            if (pendingIdle) applyIdleState();
          };

          // Safety timeout
          const duration = audioBuffer.duration * 1000 + 2000;
          ttsPlaybackTimer = setTimeout(() => {
            console.warn("[tts] Safety timeout — forcing done");
            stopTtsPlaybackInternal(true);
          }, Math.min(duration, 120000));

          source.start(0);
          rlog(`[tts] Playing via Web Audio API (${audioBuffer.duration.toFixed(1)}s)`);
        });
      }
      throw new Error("No AudioContext");
    }).catch(err => {
      rlog("[tts] Web Audio failed, trying Audio element: " + err.message);
      // Fallback: HTML Audio element — use rawBuffer (ArrayBuffer) if available, else original blob
      const typedBlob = new Blob([rawBuffer || blob], { type: "audio/mpeg" });
      const url = URL.createObjectURL(typedBlob);
      const audio = new Audio(url);
      audio.playsInline = true;
      ttsPlaying = true;

      function done() {
        ttsPlaying = false;
        URL.revokeObjectURL(url);
        if (ttsPlaybackTimer) { clearTimeout(ttsPlaybackTimer); ttsPlaybackTimer = null; }
        ttsEndedAt = Date.now();
        idleFromTtsCompletion = true;
        advanceBubbleHighlight();
        if (ws?.readyState === WebSocket.OPEN) ws.send("tts_done");
        if (pendingIdle) applyIdleState();
      }
      audio.onended = done;
      audio.onerror = done;
      ttsCurrentSource = audio;
      ttsPlaybackTimer = setTimeout(() => { audio.pause(); done(); }, 120000);
      audio.play().catch(e => { console.error("[tts] Fallback play failed:", e); done(); });
    });
  }

  function stopTtsPlaybackInternal(sendDone) {
    if (ttsPlaybackTimer) { clearTimeout(ttsPlaybackTimer); ttsPlaybackTimer = null; }
    const wasPlaying = ttsPlaying;
    if (ttsCurrentSource) {
      try {
        if (ttsCurrentSource.stop) ttsCurrentSource.stop(); // BufferSourceNode
        if (ttsCurrentSource.pause) ttsCurrentSource.pause(); // Audio element
      } catch {}
      ttsCurrentSource = null;
    }
    ttsPlaying = false;
    ttsEndedAt = Date.now();
    if (sendDone && wasPlaying && ws?.readyState === WebSocket.OPEN) ws.send("tts_done");
  }

  function stopTtsPlayback() {
    stopTtsPlaybackInternal(true);
  }

  // Talk button click
  talkBtn.addEventListener("click", () => {
    // If Claude is speaking/thinking/responding, stop everything
    if (talkBtn.classList.contains("speaking") || talkBtn.classList.contains("thinking") || talkBtn.classList.contains("responding")) {
      stopTtsPlayback();
      if (ws?.readyState === WebSocket.OPEN) ws.send("stop");
      setTalkState("idle");
      removeThinkingBubble();
      return;
    }

    if (isRecording) {
      stopRecording();
    } else {
      startRecording(false);
    }
  });

  // =============================================
  // Right Cmd toggle recording (called from native Swift global hotkey)
  // =============================================
  window.toggleRecording = function() {
    console.log("[key] toggleRecording called, isRecording=" + isRecording);
    // If Claude is speaking, stop TTS first
    if (talkBtn.classList.contains("speaking")) {
      stopTtsPlayback();
      if (ws?.readyState === WebSocket.OPEN) ws.send("stop");
      setTalkState("idle");
      return;
    }
    if (isRecording) {
      stopRecording();
    } else {
      startRecording(false); // direct mode, no wake word
    }
  };

  // =============================================
  // Auto-listen: VAD-based speech detection
  // =============================================
  let autoListenInterval = null;
  let autoListenDebugCounter = 0;

  function startAutoListen() {
    if (autoListenInterval) return;
    console.log("[auto-listen] Started");
    autoListenInterval = setInterval(() => {
      autoListenDebugCounter++;

      // Diagnostic: log blocking reason every 5s
      const shouldLog = autoListenDebugCounter % 100 === 0;
      if (muted) { if (shouldLog) rlog("[auto-listen] BLOCKED: muted"); return; }
      if (isRecording) { if (shouldLog) rlog("[auto-listen] BLOCKED: isRecording"); return; }
      if (!micAnalyser || !micDataArray) { if (shouldLog) rlog("[auto-listen] BLOCKED: no mic"); return; }
      const btnClass = talkBtn.className;
      if (btnClass.includes("thinking") || btnClass.includes("responding") ||
          btnClass.includes("speaking") || btnClass.includes("transcribing")) {
        if (shouldLog) rlog(`[auto-listen] BLOCKED: btnClass=${btnClass}`);
        return;
      }
      if (ttsPlaying) { if (shouldLog) rlog("[auto-listen] BLOCKED: ttsPlaying"); return; }
      const echoCd = Date.now() - ttsEndedAt;
      if (echoCd < TTS_ECHO_COOLDOWN) { if (shouldLog) rlog(`[auto-listen] BLOCKED: echo cooldown ${echoCd}ms`); return; }

      // Resume AudioContext if iOS suspended it (common after TTS playback)
      if (ttsAudioCtx && ttsAudioCtx.state === "suspended") {
        rlog("[auto-listen] Resuming suspended AudioContext");
        ttsAudioCtx.resume();
      }

      micAnalyser.getFloatTimeDomainData(micDataArray);
      let sum = 0;
      for (let i = 0; i < micDataArray.length; i++) sum += micDataArray[i] * micDataArray[i];
      const rms = Math.sqrt(sum / micDataArray.length);

      // Debug log every 5s (remote)
      if (shouldLog) {
        const ctxState = ttsAudioCtx ? ttsAudioCtx.state : "none";
        rlog(`[auto-listen] rms=${rms.toFixed(4)} threshold=${SPEECH_THRESHOLD} hot=${conversationHot} ctxState=${ctxState} btnClass=${btnClass}`);
      }

      if (rms > SPEECH_THRESHOLD) {
        if (speechConfirmStart === 0) {
          speechConfirmStart = Date.now();
        } else if (Date.now() - speechConfirmStart > SPEECH_CONFIRM_MS) {
          rlog(`[auto-listen] Speech detected! rms=${rms.toFixed(4)} hot=${conversationHot} — starting recording`);
          speechConfirmStart = 0;
          startRecording(true);
        }
      } else {
        speechConfirmStart = 0;
      }
    }, 50);
  }

  function tryStartAutoListen() {
    if (autoListenEnabled && micAnalyser) {
      startAutoListen();
    } else if (autoListenEnabled) {
      console.log("[auto-listen] Waiting for mic...");
      setTimeout(tryStartAutoListen, 1000);
    }
  }
  setTimeout(tryStartAutoListen, 1500);

  try { connect(); } catch(e) { console.warn("[ws] connect() error:", e); }

  // =============================================
  // iOS app-switch: re-acquire mic + resume AudioContext
  // =============================================
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) return;
    // iOS kills mic streams when backgrounded — check and re-acquire
    if (micStream) {
      const alive = micStream.getTracks().every(t => t.readyState === "live");
      if (!alive) {
        console.log("[visibility] Mic stream dead, re-acquiring...");
        micStream = null;
        micAnalyser = null;
        micDataArray = null;
        initMicMeter();
      }
    }
    // Resume AudioContext if iOS suspended it
    if (ttsAudioCtx && ttsAudioCtx.state === "suspended") {
      console.log("[visibility] Resuming suspended AudioContext");
      ttsAudioCtx.resume();
    }
    // Reconnect WebSocket if it dropped during background
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.log("[visibility] WebSocket not open, reconnecting...");
      try { connect(); } catch(e) { console.warn("[ws] reconnect error:", e); }
    }
  });

  // =============================================
  // Terminal Panel
  // =============================================
  function toggleTerminal() {
    terminalOpen = !terminalOpen;
    terminalPanel.classList.toggle("open", terminalOpen);
    document.getElementById("termToggleLabel").textContent = (terminalOpen ? "▼" : "▶") + " Terminal";
    localStorage.setItem("term-open", terminalOpen ? "1" : "0");
    if (terminalOpen) {
      termAutoScroll = true;
      terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }
  }

  terminalHeader.addEventListener("click", toggleTerminal);

  // Replay button
  document.getElementById("replayBtn").addEventListener("click", () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send("replay");
      rlog("[replay] Requested replay of last response");
    }
  });

  // Restart server button
  document.getElementById("restartBtn").addEventListener("click", () => {
    if (confirm("Restart Murmur server?")) {
      const btn = document.getElementById("restartBtn");
      btn.classList.add("spinning");
      if (ws && ws.readyState === WebSocket.OPEN) ws.send("restart");
    }
  });


  // Chat transcript zoom controls
  let chatFontSize = parseFloat(localStorage.getItem("chat-font-size") || "12.5");
  transcript.style.setProperty("--chat-font-size", chatFontSize + "px");
  const chatZoomIn = document.getElementById("chatZoomIn");
  const chatZoomOut = document.getElementById("chatZoomOut");
  chatZoomIn.addEventListener("click", () => {
    chatFontSize = Math.min(22, chatFontSize + 1);
    transcript.style.setProperty("--chat-font-size", chatFontSize + "px");
    localStorage.setItem("chat-font-size", String(chatFontSize));
  });
  chatZoomOut.addEventListener("click", () => {
    chatFontSize = Math.max(8, chatFontSize - 1);
    transcript.style.setProperty("--chat-font-size", chatFontSize + "px");
    localStorage.setItem("chat-font-size", String(chatFontSize));
  });

  // Terminal zoom controls
  termZoomIn.addEventListener("click", (e) => {
    e.stopPropagation();
    termFontSize = Math.min(24, termFontSize + 1);
    terminalOutput.style.fontSize = termFontSize + "px";
    localStorage.setItem("term-font-size", String(termFontSize));
  });
  termZoomOut.addEventListener("click", (e) => {
    e.stopPropagation();
    termFontSize = Math.max(6, termFontSize - 1);
    terminalOutput.style.fontSize = termFontSize + "px";
    localStorage.setItem("term-font-size", String(termFontSize));
  });

  // Terminal nav buttons for interactive prompts
  document.getElementById("termKeyUp").addEventListener("click", (e) => { e.stopPropagation(); if (ws?.readyState === WebSocket.OPEN) ws.send("key:up"); });
  document.getElementById("termKeyDown").addEventListener("click", (e) => { e.stopPropagation(); if (ws?.readyState === WebSocket.OPEN) ws.send("key:down"); });
  document.getElementById("termKeyEnter").addEventListener("click", (e) => { e.stopPropagation(); if (ws?.readyState === WebSocket.OPEN) ws.send("key:enter"); });
  document.getElementById("termKeyEsc").addEventListener("click", (e) => { e.stopPropagation(); if (ws?.readyState === WebSocket.OPEN) ws.send("key:escape"); });
  document.getElementById("termKeyTab").addEventListener("click", (e) => { e.stopPropagation(); if (ws?.readyState === WebSocket.OPEN) ws.send("key:tab"); });

  termClearBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    terminalOutput.innerHTML = "";
  });

  function sendTerminalInput() {
    const text = terminalInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send("text:" + text);
    terminalInput.value = "";
  }

  termSendBtn.addEventListener("click", sendTerminalInput);
  terminalInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendTerminalInput();
    }
  });

  // Detect manual scroll-up to pause auto-scroll
  terminalOutput.addEventListener("scroll", () => {
    const { scrollTop, scrollHeight, clientHeight } = terminalOutput;
    termAutoScroll = scrollHeight - scrollTop - clientHeight < 30;
  });

  // =============================================
  // Tooltip
  // =============================================
  const tip = document.createElement("div");
  tip.className = "tooltip";
  document.body.appendChild(tip);

  let tipTimer;
  document.addEventListener("pointerenter", (e) => {
    if (!e.target || !e.target.closest) return;
    const el = e.target.closest("[data-tip]");
    if (!el) return;
    clearTimeout(tipTimer);
    tipTimer = setTimeout(() => {
      tip.textContent = el.dataset.tip;
      tip.classList.add("visible");
      const r = el.getBoundingClientRect();
      const tw = tip.offsetWidth;
      let top = r.top - tip.offsetHeight - 4;
      if (top < 2) top = r.bottom + 4;
      let left = r.left + r.width / 2 - tw / 2;
      if (left < 4) left = 4;
      if (left + tw > window.innerWidth - 4) left = window.innerWidth - tw - 4;
      tip.style.top = top + "px";
      tip.style.left = left + "px";
    }, 400);
  }, true);

  document.addEventListener("pointerleave", (e) => {
    if (e.target && e.target.closest && e.target.closest("[data-tip]")) {
      clearTimeout(tipTimer);
      tip.classList.remove("visible");
    }
  }, true);
</script>
</body>
