name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Create the GitHub release first — prevents race when both build jobs try to publish
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          # Create release if it doesn't exist; update if it does
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — will upload assets to it"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Murmur ${{ steps.ver.outputs.version }}" \
              --draft \
              --generate-notes
            echo "Created draft release $TAG"
          fi

  build-mac:
    needs: [create-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Set version
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd electron && node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install root dependencies
        run: npm install

      - name: Install Electron dependencies
        run: cd electron && npm install

      - name: Build macOS release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: cd electron && npm run release:mac

      - name: Validate macOS artifacts
        run: |
          DMG=$(find electron/dist -name '*.dmg' -size +1M | head -1)
          if [ -z "$DMG" ]; then echo "ERROR: No DMG found or file too small"; exit 1; fi
          echo "DMG OK: $(basename $DMG) ($(du -h $DMG | cut -f1))"

  build-win:
    needs: [create-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Set version
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          cd electron
          node -e "const pkg = require('./package.json'); pkg.version = '$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install root dependencies
        run: npm install

      - name: Install Electron dependencies
        run: cd electron && npm install

      - name: Build Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd electron && npm run release:win

      - name: Validate Windows artifacts
        shell: bash
        run: |
          EXE=$(find electron/dist -name '*.exe' -size +1M | head -1)
          if [ -z "$EXE" ]; then echo "ERROR: No exe found or file too small"; exit 1; fi
          echo "EXE OK: $(basename $EXE)"

  # Verify both platforms published successfully
  verify-release:
    needs: [create-release, build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft flag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
          echo "Published release $TAG"

      - name: Check release has both platform assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name')
          echo "Release assets:"
          echo "$ASSETS"
          echo "$ASSETS" | grep -q '\.dmg' || echo "WARNING: No DMG in release"
          echo "$ASSETS" | grep -q '\.exe' || echo "WARNING: No exe in release"
