name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from commit count
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd electron && node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install root dependencies
        run: npm install

      - name: Install Electron dependencies
        run: cd electron && npm install

      - name: Build macOS release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: cd electron && npm run release:mac

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from commit count
        run: |
          $COUNT = git rev-list --count HEAD
          $VERSION = "1.0.$COUNT"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          cd electron
          node -e "const pkg = require('./package.json'); pkg.version = '$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install root dependencies
        run: npm install

      - name: Install Electron dependencies
        run: cd electron && npm install

      - name: Build Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd electron && npm run release:win
